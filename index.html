<!doctype html>
<html lang="ru">
  <head>
    <!-- prettier-ignore -->
    {{> layout/head title="Главная" description="Шаблон фронтенд-проекта на Vite с Vue Islands, SCSS и Handlebars"}}
  </head>

  <body>
    {{> layout/svg-sprite}} {{> layout/header}}
    <main class="page">
      {{> sections/materials}} {{> sections/advantages}} {{>
      sections/save-money}}
      <section
        class="visit-form"
        data-vue-island="SmallForm"
        data-props='{"apiUrl": "/api/contact", "imageUrl": "/assets/images/visit-form.png","policyUrl": "/privacy-policy" }'
      ></section>
    </main>
    {{> layout/footer}} {{> layout/scripts}}
  </body>
</html>
